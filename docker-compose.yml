services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "9999:9999"
    environment:
      # Put real keys in your shell env or a local .env file (DO NOT commit it).
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://backend:9999/chat
    depends_on:
      - backend

